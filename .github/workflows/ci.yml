name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives.
# Keeps CI minutes focused on the latest commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bluecairn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # --- DB bootstrap inputs (consumed by setup-ci-db.sh) ---
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/bluecairn
      ADMIN_URL: postgresql://bluecairn_admin:ci_admin_password_16chars@localhost:5432/bluecairn
      BLUECAIRN_APP_PASSWORD: ci_app_password_16chars
      BLUECAIRN_ADMIN_PASSWORD: ci_admin_password_16chars

      # --- Env schema (consumed by apps/api at import + by tests) ---
      DATABASE_URL: postgresql://bluecairn_app:ci_app_password_16chars@localhost:5432/bluecairn
      DATABASE_URL_ADMIN: postgresql://bluecairn_admin:ci_admin_password_16chars@localhost:5432/bluecairn
      TELEGRAM_BOT_TOKEN: "0000000000:TEST-TOKEN-CI-ONLY-NEVER-LIVE"
      TELEGRAM_WEBHOOK_SECRET: ci-test-webhook-secret-do-not-use-in-production-envs
      NODE_ENV: test
      LOG_LEVEL: warn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install psql client (fast path — pre-installed on ubuntu-latest)
        # ubuntu-latest ships with psql already. `apt-get update` was
        # hanging 5+ min on a flaky mirror during BLU-22 CI run
        # (#24756781046). Skip the update when psql is present; keep a
        # bounded-retry install as a fallback if the runner image ever
        # drops psql.
        run: |
          if command -v psql >/dev/null 2>&1; then
            echo "psql already present: $(psql --version)"
            exit 0
          fi
          echo "psql missing — installing with retries"
          for i in 1 2 3; do
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client && exit 0
            echo "apt attempt $i failed, retrying in 10s…"
            sleep 10
          done
          echo "apt install failed after 3 attempts" >&2
          exit 1

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bootstrap database
        run: bash packages/db/scripts/setup-ci-db.sh

      # Parallel-where-possible via turbo's task graph. typecheck and lint
      # don't depend on each other, so --parallel is safe.
      - name: Typecheck
        run: bunx turbo typecheck

      - name: Lint
        run: bunx turbo lint

      - name: Test
        run: bunx turbo test

      - name: Build
        run: bunx turbo build

  # ---------------------------------------------------------------------------
  # BLU-36: after a green `verify` on main, auto-sync the Inngest Cloud app.
  #
  # Railway deploys workers-staging independently on every push to main (via
  # its GitHub integration). Without this job, Inngest Cloud's function
  # registry stays stale — new functions (orchestrator.route, agent.concierge.run,
  # action.gate, …) land on the workers endpoint but Inngest doesn't know to
  # invoke them until someone clicks "Sync" in the Dashboard.
  #
  # Mechanism: `PUT /api/inngest` on the Inngest `serve()` handler tells it
  # to push its current function manifest to Inngest Cloud. Auth between the
  # handler and Inngest Cloud is via INNGEST_SIGNING_KEY (already provisioned
  # on workers-staging via Doppler). We only need to trigger the PUT.
  #
  # Safety: we wait until `/health` reports a `deployedSha` that matches
  # `github.sha` — so we don't sync the OLD deployment's manifest during a
  # Railway rolling swap.
  # ---------------------------------------------------------------------------
  sync-inngest-staging:
    name: sync-inngest-staging
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10

    env:
      WORKERS_URL: https://workers-staging-staging-8181.up.railway.app

    steps:
      - name: Wait for Railway to rotate to ${{ github.sha }}
        run: |
          EXPECTED="${GITHUB_SHA}"
          echo "Waiting for workers-staging /health.deployedSha == ${EXPECTED:0:8}"
          for i in $(seq 1 60); do  # 60 * 5s = 5 min max
            # `|| true` keeps the loop going on transient curl errors
            # (deploy window, DNS hiccup). `--max-time` bounds each probe.
            RESP=$(curl -sfS --max-time 5 "$WORKERS_URL/health" || true)
            SHA=$(echo "$RESP" | jq -r '.deployedSha // "unknown"' 2>/dev/null || echo "unknown")
            if [ "$SHA" = "$EXPECTED" ]; then
              echo "Workers at ${SHA:0:8} — new deployment is live"
              exit 0
            fi
            echo "attempt $i/60 — current=${SHA:0:8} expected=${EXPECTED:0:8}"
            sleep 5
          done
          echo "::error::Railway did not rotate to $EXPECTED within 5min; skipping Inngest sync to avoid registering stale manifest"
          exit 1

      - name: PUT /api/inngest to trigger function re-registration
        # The Inngest `serve()` handler responds to PUT by reading its
        # current function manifest and pushing it to Inngest Cloud using
        # the worker's INNGEST_SIGNING_KEY. Idempotent — safe to re-run.
        run: |
          curl -X PUT "$WORKERS_URL/api/inngest" \
            --fail-with-body \
            --max-time 30 \
            -H 'Accept: application/json' \
            -w '\nhttp_code=%{http_code}\n'
