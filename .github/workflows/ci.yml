name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs on the same branch when a new push arrives.
# Keeps CI minutes focused on the latest commit.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: bluecairn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # --- DB bootstrap inputs (consumed by setup-ci-db.sh) ---
      POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/bluecairn
      ADMIN_URL: postgresql://bluecairn_admin:ci_admin_password_16chars@localhost:5432/bluecairn
      BLUECAIRN_APP_PASSWORD: ci_app_password_16chars
      BLUECAIRN_ADMIN_PASSWORD: ci_admin_password_16chars

      # --- Env schema (consumed by apps/api at import + by tests) ---
      DATABASE_URL: postgresql://bluecairn_app:ci_app_password_16chars@localhost:5432/bluecairn
      DATABASE_URL_ADMIN: postgresql://bluecairn_admin:ci_admin_password_16chars@localhost:5432/bluecairn
      TELEGRAM_BOT_TOKEN: "0000000000:TEST-TOKEN-CI-ONLY-NEVER-LIVE"
      TELEGRAM_WEBHOOK_SECRET: ci-test-webhook-secret-do-not-use-in-production-envs
      NODE_ENV: test
      LOG_LEVEL: warn

      # --- ops-web (BLU-26) stubs — `next build` runs during CI and
      # imports `src/env.ts` at compile time; Zod validates at-least-32-char
      # BETTER_AUTH_SECRET + URL shape for BETTER_AUTH_URL, so stubs must
      # satisfy those rules. OAuth creds are placeholders — no real flow
      # is exercised in CI.
      BETTER_AUTH_SECRET: ci-stub-better-auth-secret-at-least-thirty-two-characters-long-please
      BETTER_AUTH_URL: http://localhost:3002
      GOOGLE_CLIENT_ID: ci-stub-google-client-id
      GOOGLE_CLIENT_SECRET: ci-stub-google-client-secret
      OPS_WEB_ALLOWED_EMAILS: ci-stub@example.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Install psql client (fast path — pre-installed on ubuntu-latest)
        # ubuntu-latest ships with psql already. `apt-get update` was
        # hanging 5+ min on a flaky mirror during BLU-22 CI run
        # (#24756781046). Skip the update when psql is present; keep a
        # bounded-retry install as a fallback if the runner image ever
        # drops psql.
        run: |
          if command -v psql >/dev/null 2>&1; then
            echo "psql already present: $(psql --version)"
            exit 0
          fi
          echo "psql missing — installing with retries"
          for i in 1 2 3; do
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client && exit 0
            echo "apt attempt $i failed, retrying in 10s…"
            sleep 10
          done
          echo "apt install failed after 3 attempts" >&2
          exit 1

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bootstrap database
        run: bash packages/db/scripts/setup-ci-db.sh

      # Parallel-where-possible via turbo's task graph. typecheck and lint
      # don't depend on each other, so --parallel is safe.
      - name: Typecheck
        run: bunx turbo typecheck

      - name: Lint
        run: bunx turbo lint

      - name: Test
        run: bunx turbo test

      - name: Build
        run: bunx turbo build

  # ---------------------------------------------------------------------------
  # BLU-36 follow-up: drive the workers-staging deploy from CI with an explicit
  # commit SHA.
  #
  # Why: Railway's auto-injected `RAILWAY_GIT_COMMIT_SHA` is only populated on
  # Git-triggered deploys. Non-Git triggers (Doppler live-sync from BLU-31,
  # manual redeploys, `railway up` CLI) leave it empty — the deploy still runs
  # the correct latest-main code, but `/health.deployedSha` reports 'unknown',
  # which breaks `sync-inngest-staging`'s polling (see failed run of PR #27).
  #
  # Fix: CI sets `DEPLOY_COMMIT_SHA` on the workers-staging service before each
  # deploy. Setting a Railway variable (without `--skip-deploys`) triggers a
  # redeploy that inherits the new env var. `/health` prefers `DEPLOY_COMMIT_SHA`
  # over `RAILWAY_GIT_COMMIT_SHA`, guaranteeing the polling works regardless of
  # what triggered the deploy.
  #
  # Also addresses BLU-17's AC gap (no `deploy-staging.yml`) — this job is the
  # CI-owned deploy step for workers-staging that was missing.
  # ---------------------------------------------------------------------------
  deploy-workers-staging:
    name: deploy-workers-staging
    needs: verify
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli@4

      - name: Set DEPLOY_COMMIT_SHA (triggers Railway redeploy)
        # Setting a var without `--skip-deploys` triggers Railway to redeploy
        # the service, picking up the new env var. The redeploy builds from
        # the currently linked branch (main) — so the new workers binary has
        # both (a) latest main code and (b) DEPLOY_COMMIT_SHA=<this commit>
        # baked into its runtime env.
        run: |
          railway variable set "DEPLOY_COMMIT_SHA=${GITHUB_SHA}" \
            --service @workers-staging --environment staging

  # Inngest sync runs in-process on workers container boot
  # (apps/workers/src/index.ts). The previous CI-driven sync deadlocked with
  # Railway's "Wait for CI" gate — any check_run on the merge commit (including
  # from a workflow_run-triggered workflow) blocked the Railway deploy until
  # the suite went fully green, which the sync itself couldn't satisfy without
  # a deploy. Evidence: 10 consecutive SKIPPED deployments with
  # `skippedReason: "CI check suite failed"`.
