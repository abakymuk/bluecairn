name: sync-inngest

# Auto-sync Inngest Cloud's function manifest after every successful main-CI
# run. This workflow lives *outside* ci.yml on purpose.
#
# Why a separate workflow:
#
# Railway's `workers-staging` service is configured with "Wait for CI to pass"
# enabled. Railway queues a deploy when `ci.yml` triggers one (via
# `railway variable set DEPLOY_COMMIT_SHA=…` in `deploy-workers-staging`), then
# checks the commit's GitHub check-suite status. If the suite has any failing
# or pending check that Railway can see, it marks the deploy SKIPPED with
# reason "CI check suite failed".
#
# When sync-inngest-staging lived inside ci.yml, it sat in the same check-suite
# that Railway was waiting on, and it couldn't succeed until Railway finished
# deploying — a circular wait. Every main-merge from PR #27 through PR #30
# timed out at 60/60 polls and left the workers-staging container running stale
# code. Evidence: `railway deployment list` showed 4 consecutive SKIPPED
# deploys with commitHashes matching PRs #27–#30.
#
# Moving sync to `workflow_run` means the CI check-suite for each merge commit
# only contains `verify` + `deploy-workers-staging` — both fast, both reliably
# green. Railway's gate releases, the deploy lands, then this workflow fires
# and polls `/health.deployedSha` for the just-deployed SHA. Any check_run this
# workflow adds to the commit's suite arrives after Railway has already
# committed to the deploy, so it can't feed back into the deadlock.

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  sync-inngest-staging:
    name: sync-inngest-staging
    runs-on: ubuntu-latest
    # Skip if CI itself failed — there's nothing coherent to sync.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 15

    env:
      WORKERS_URL: https://workers-staging-staging-8181.up.railway.app
      # `workflow_run` context's `github.sha` is the default-branch head at the
      # time this workflow starts, not the SHA of the triggering CI run.
      # Use `workflow_run.head_sha` to track the actual merged commit.
      EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Wait for Railway to rotate to ${{ github.event.workflow_run.head_sha }}
        run: |
          echo "Waiting for workers-staging /health.deployedSha == ${EXPECTED_SHA:0:8}"
          # Railway's build + rollout on pro plan routinely takes 3–6 min. Plus
          # the check-suite gate adds up-to-a-minute of Railway-side queueing.
          # 120 * 5s = 10 min headroom.
          for i in $(seq 1 120); do
            RESP=$(curl -sfS --max-time 5 "$WORKERS_URL/health" || true)
            SHA=$(echo "$RESP" | jq -r '.deployedSha // "unknown"' 2>/dev/null || echo "unknown")
            if [ "$SHA" = "$EXPECTED_SHA" ]; then
              echo "Workers at ${SHA:0:8} — new deployment is live"
              exit 0
            fi
            echo "attempt $i/120 — current=${SHA:0:8} expected=${EXPECTED_SHA:0:8}"
            sleep 5
          done
          echo "::error::Railway did not rotate to $EXPECTED_SHA within 10min; skipping Inngest sync to avoid registering stale manifest"
          exit 1

      - name: PUT /api/inngest to trigger function re-registration
        # The Inngest `serve()` handler responds to PUT by reading its current
        # function manifest and pushing it to Inngest Cloud using the worker's
        # INNGEST_SIGNING_KEY. Idempotent — safe to re-run.
        run: |
          curl -X PUT "$WORKERS_URL/api/inngest" \
            --fail-with-body \
            --max-time 30 \
            -H 'Accept: application/json' \
            -w '\nhttp_code=%{http_code}\n'
